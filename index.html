<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a Session | Kecpodschedule Studio</title>
  <meta name="description" content="Book your podcast recording session at Kecpodschedule Studio. Select your date, time slot, and fill in your details to get started." />
  <link rel="stylesheet" href="css/styles.css?v=3" />
  <script src="js/theme.js?v=3"></script>
    <script src="js/auth.js?v=3"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { background: var(--bg-base); }
    .top-nav {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .top-nav-logo { display: flex; align-items: center; gap: 10px; }
    .top-nav-links { display: flex; gap: 8px; }
    .booking-section { margin-bottom: 32px; }
    .date-picker-row { display: flex; align-items: flex-end; gap: 20px; }
    .date-picker-row .form-group { flex: 0 0 auto; }
    #dateInput { width: 220px; }
    .slot-section { animation: fadeIn 0.3s ease; }
    .form-section { animation: fadeIn 0.3s ease; }
    .submit-row { display: flex; justify-content: flex-end; margin-top: 8px; }
    .booking-note {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--accent-dim);
      border: 1px solid rgba(124,92,252,0.25);
      border-radius: var(--radius-md);
      padding: 14px 16px;
      font-size: 0.85rem; color: var(--text-secondary);
      margin-bottom: 24px;
    }
    .booking-note-icon { font-size: 1rem; flex-shrink: 0; color: var(--accent-light); }
  </style>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
<div class="page-wrapper">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon" style="background:var(--accent);color:#fff;box-shadow:none;border-radius:var(--radius-md);"><i data-lucide="mic"></i></div>
        <div>
          <div class="logo-text">Kecpodschedule</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="admin.html" class="nav-item admin-only">
        <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span> Dashboard
      </a>
      <a href="index.html" class="nav-item active">
        <span class="nav-icon"><i data-lucide="mic"></i></span> Booking
      </a>
      <a href="calendar.html" class="nav-item admin-only">
        <span class="nav-icon"><i data-lucide="calendar"></i></span> Calendar
      </a>
      <a href="workflow.html" class="nav-item admin-only">
        <span class="nav-icon"><i data-lucide="kanban"></i></span> Workflow
      </a>
      <a href="reminders.html" class="nav-item admin-only" id="nav-reminders">
        <span class="nav-icon"><i data-lucide="bell"></i></span> Reminders
      </a>
    
      <a href="#" class="nav-item logout-btn" style="color:var(--danger); margin-top: auto;">
        <span class="nav-icon"><i data-lucide="log-out"></i></span> Logout
      </a>
    </nav>
    <div class="sidebar-footer" id="sidebarFooter">
      <div class="nav-item text-muted">
        <div style="width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:bold;margin-right:8px;" class="user-avatar">AS</div>
        <span class="user-name">Admin User</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mob-menu-btn" id="menuBtn"><i data-lucide="menu"></i></button>
        <div class="search-bar" style="margin-left: 12px; max-width: 400px; display: flex; gap: 12px; align-items: center; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-md); padding: 8px 14px; width: 300px;">
          <span style="color:var(--text-muted);"><i data-lucide="search" style="width:16px;height:16px"></i></span>
          <input type="text" placeholder="Search bookings, podcasts..." style="background:none; border:none; color:var(--text-primary); font-size:0.9rem; width:100%; outline:none;" />
        </div>
      </div>
      <div class="topbar-actions">
        <button id="themeToggleBtn" class="btn btn-ghost btn-sm" style="font-size:1.1rem;padding:4px 8px;" title="Toggle Theme"><i data-lucide="moon"></i></button>
      </div>
    </div>

    <!-- Booking Content -->
    <div class="content-area" style="display:flex; flex-direction:column; align-items:center;">
      <div style="text-align:center; margin-bottom: 40px;">
        <h1 style="font-size: 2.2rem; margin-bottom: 10px;">Book a Podcast Session</h1>
        <p class="text-muted" style="font-size: 1.1rem;">Fill in your details to reserve a recording slot</p>
      </div>

      <main class="booking-body card" style="width: 100%; max-width: 800px; padding: 40px;">
        
        <!-- Step 3: Details Form (Moved to top based on mockup) -->
        <section class="booking-section">
          <div class="section-header">
            <h4>Personal Information</h4>
          </div>
          <form id="bookingForm">
            <div class="form-row mb-20">
              <div class="form-group">
                <label class="form-label" for="guestName">Full Name *</label>
                <input type="text" class="form-control" id="guestName" placeholder="e.g. Alex Rivera" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="guestEmail">Email Address *</label>
                <input type="email" class="form-control" id="guestEmail" placeholder="e.g. alex@email.com" required />
              </div>
            </div>
            <div class="form-row mb-20">
              <div class="form-group">
                <label class="form-label" for="guestWhatsapp">WhatsApp Number *</label>
                <input type="tel" class="form-control" id="guestWhatsapp" placeholder="e.g. +233 24 000 0000" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="guestDepartment">Department / Office Name *</label>
                <input type="text" class="form-control" id="guestDepartment" placeholder="e.g. Dept. of Computer Engineering" required />
              </div>
            </div>
            <div class="form-group mb-20">
              <label class="form-label" for="podTitle">Podcast Title *</label>
              <input type="text" class="form-control" id="podTitle" placeholder="e.g. Tech Talk Weekly" required />
            </div>
            <div class="form-group mb-20">
              <label class="form-label" for="podDescription">Podcast Description</label>
              <textarea class="form-control" id="podDescription" rows="3" placeholder="Briefly describe what this podcast episode is about..." style="resize:vertical;"></textarea>
            </div>
            <div class="form-row mb-32">
              <div class="form-group">
                <label class="form-label" for="podType">Podcast Type *</label>
                <select class="form-control" id="podType" required style="cursor:pointer;">
                  <option value="">-- Select type --</option>
                  <option value="One-on-One">One-on-One</option>
                  <option value="Group">Group</option>
                </select>
              </div>
              <div class="form-group">
                <label class="form-label" for="podParticipants">Number of Participants *</label>
                <input type="number" class="form-control" id="podParticipants" min="1" max="20" placeholder="e.g. 3" required />
              </div>
            </div>

            <!-- Step 1 & 2: Date & Time -->
            <div class="section-header" style="margin-top: 40px;">
              <h4>Select Date & Time</h4>
            </div>
            <div class="form-group mb-20">
              <label class="form-label" for="dateInput">Preferred Date *</label>
              <div style="display:flex; gap:12px;">
                <input type="date" class="form-control" id="dateInput" style="max-width:300px;" required />
                <button type="button" class="btn btn-ghost" id="checkDateBtn">Check Slots</button>
              </div>
            </div>

            <div class="form-group mb-32" id="slotSection" style="display:none;">
              <label class="form-label">Available Time Slots *</label>
              <div class="slot-grid" id="slotGrid"></div>
              <p class="text-xs text-muted mt-8"><span style="color:var(--danger)">•</span> Red dot indicates unavailable slots</p>
            </div>

            <div class="submit-row" style="margin-top: 40px;">
              <button type="submit" class="btn btn-primary w-full btn-lg" id="submitBtn" style="justify-content:center;">
                <span style="margin-right:8px;"><i data-lucide="check" style="width:16px;height:16px"></i></span> Book Session
              </button>
            </div>
          </form>
        </section>

      </main>
    </div>
  </div>
</div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script src="js/data.js?v=3"></script>
  <script src="js/booking.js?v=3"></script>
</body>
</html>
