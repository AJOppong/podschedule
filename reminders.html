<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Send Reminders | KEC Podcast Studios</title>
  <meta name="description" content="Send session reminders to clients securely." />
  <link rel="stylesheet" href="css/styles.css?v=4" />
  <script src="js/theme.js?v=4"></script>
    <script src="js/auth.js?v=4"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @media (max-width: 768px) {
      .booking-body { padding: 24px 16px !important; }
      h1 { font-size: 1.8rem !important; }
    }
  </style>
</head>
<body>
<div class="page-wrapper">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <div class="logo-icon" style="background:var(--accent);color:#fff;box-shadow:none;border-radius:var(--radius-md);"><i data-lucide="mic"></i></div>
        <div>
          <div class="logo-text">KEC Podcast Studios</div>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="admin.html" class="nav-item admin-only" id="nav-dashboard">
        <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span> Dashboard
      </a>
      <a href="book.html" class="nav-item">
        <span class="nav-icon"><i data-lucide="mic"></i></span> Booking
      </a>
      <a href="calendar.html" class="nav-item admin-only" id="nav-calendar">
        <span class="nav-icon"><i data-lucide="calendar"></i></span> Calendar
      </a>
      <a href="workflow.html" class="nav-item admin-only">
        <span class="nav-icon"><i data-lucide="kanban"></i></span> Workflow
      </a>
      <a href="reminders.html" class="nav-item active admin-only" id="nav-reminders">
        <span class="nav-icon"><i data-lucide="bell"></i></span> Reminders
      </a>
    
      <a href="#" class="nav-item logout-btn" style="color:var(--danger); margin-top: auto;">
        <span class="nav-icon"><i data-lucide="log-out"></i></span> Logout
      </a>
    </nav>
    <div class="sidebar-footer" id="sidebarFooter">
      <div class="nav-item text-muted">
        <div style="width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:0.75rem;font-weight:bold;margin-right:8px;" class="user-avatar">AS</div>
        <span class="user-name">Admin User</span>
      </div>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-content">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:12px;">
        <button class="mob-menu-btn" id="menuBtn"><i data-lucide="menu"></i></button>
      </div>
      <div class="topbar-actions">
        <button id="themeToggleBtn" class="btn btn-ghost btn-sm" style="font-size:1.1rem;padding:4px 8px;" title="Toggle Theme"><i data-lucide="moon"></i></button>
      </div>
    </div>

    <!-- Page Content -->
    <div class="content-area" style="display:flex; flex-direction:column; align-items:center;">
      <div style="text-align:center; margin-bottom: 40px;">
        <h1 style="font-size: 2.2rem; margin-bottom: 10px;">Send Reminders</h1>
        <p class="text-muted" style="font-size: 1.1rem;">Select an upcoming booking to generate an email template</p>
      </div>

      <main class="booking-body card fade-in" style="width: 100%; max-width: 800px; padding: 40px;">
        
        <section class="booking-section">
          <div class="form-group mb-32">
            <label class="form-label" for="bookingSelect">Target Booking / Guest Email</label>
            <select id="bookingSelect" class="form-control" style="cursor: pointer;">
              <option value="">Loading bookings...</option>
            </select>
            <p class="text-xs text-muted mt-8"><i data-lucide="info" style="width:12px;height:12px;vertical-align:bottom;"></i> Only future 'Booked' sessions are displayed.</p>
          </div>

          <div id="previewSection" style="display:none; margin-top: 40px;" class="fade-in">
            <div class="section-header">
              <h4>Email Draft Preview</h4>
            </div>
            
            <div style="background:var(--bg-base); padding: 24px; border-radius: var(--radius-md); border: 1px dashed var(--border);">
              <div style="margin-bottom: 12px; font-size: 0.95rem;"><strong>To:</strong> <span id="previewTo" style="color:var(--text-secondary)"></span></div>
              <div style="margin-bottom: 24px; font-size: 0.95rem;"><strong>Subject:</strong> <span id="previewSubject" style="color:var(--text-secondary)"></span></div>
              
              <div style="border-top: 1px solid var(--border); padding-top: 24px;">
                <div id="previewBody" style="white-space: pre-wrap; color: var(--text-primary); font-size: 1rem; line-height: 1.8;"></div>
              </div>
            </div>

            <div class="submit-row" style="margin-top: 32px;">
              <a href="#" target="_blank" rel="noopener noreferrer" class="btn btn-primary w-full btn-lg" id="sendReminderBtn" style="justify-content:center;">
                <span style="margin-right:8px;"><i data-lucide="send" style="width:18px;height:18px"></i></span> Open Output in Email Client
              </a>
            </div>
          </div>
        </section>

      </main>
    </div>
  </div>
</div>

<script src="js/data.js?v=4"></script>
<script src="js/reminders.js?v=4"></script>
<script>
  // Mobile sidebar backdrop
  const menuBtn = document.getElementById('menuBtn');
  const sidebar = document.getElementById('sidebar');
  if (menuBtn && sidebar) {
    let backdrop = document.createElement('div');
    backdrop.className = 'sidebar-backdrop';
    document.body.appendChild(backdrop);
    menuBtn.addEventListener('click', () => {
      sidebar.classList.toggle('open');
      backdrop.classList.toggle('open');
    });
    backdrop.addEventListener('click', () => {
      sidebar.classList.remove('open');
      backdrop.classList.remove('open');
    });
  }
</script>
</body>
</html>
