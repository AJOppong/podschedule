<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | PodSchedule</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Theme & Auth scripts MUST run early to prevent flashing -->
    <script src="js/theme.js"></script>
    <script src="js/auth.js"></script>
    <link rel="stylesheet" href="css/styles.css">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: var(--bg-base);
            margin: 0;
            font-family: var(--font-stack);
        }

        .login-card {
            background: var(--bg-surface);
            padding: 40px;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .login-logo .icon-wrapper {
            background: var(--primary);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-subtitle {
            color: var(--text-muted);
            margin-bottom: 32px;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: var(--text-primary);
            font-size: 0.9rem;
        }

        .form-control {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-base);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            font-size: 1rem;
            font-weight: 600;
            margin-top: 12px;
        }

        .demo-credentials {
            margin-top: 32px;
            padding: 16px;
            background: var(--bg-elevated);
            border: 1px dashed var(--border);
            border-radius: var(--radius-md);
            font-size: 0.85rem;
            color: var(--text-muted);
            text-align: left;
        }

        .demo-credentials strong {
            color: var(--text-primary);
        }

        /* Top right theme toggle for the login page */
        .top-nav {
            position: absolute;
            top: 24px;
            right: 32px;
        }
    </style>
</head>
<body>

    <div class="top-nav">
        <button class="icon-btn" id="themeToggleBtn" title="Toggle Theme">
            <i data-lucide="moon"></i>
        </button>
    </div>

    <div class="login-card fade-in">
        <div class="login-logo">
            <div class="icon-wrapper">
                <i data-lucide="mic"></i>
            </div>
            PodSchedule
        </div>
        <div class="login-subtitle">Welcome back. Please sign in to continue.</div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Email Address</label>
                <input type="email" id="email" class="form-control" required placeholder="name@company.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input type="password" id="password" class="form-control" required placeholder="••••••••" autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary login-btn">Sign In</button>
        </form>

        <div class="demo-credentials">
            <strong><i data-lucide="info" style="width:14px;height:14px;vertical-align:middle;margin-right:4px;"></i> Demo Access</strong><br><br>
            • Admin: <strong>admin@podschedule.com</strong><br>
            • Client: <strong>Any other email</strong><br>
            • Password: <em>Anything</em>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            window.PodAuth.login(email, password);
        });
    </script>
</body>
</html>
